<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Marques Imóveis | Premium</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
        }
        .container { 
            background: #121212; 
            border: 1px solid #F9C71D; 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(249, 199, 29, 0.15);
        }
        .logo { max-width: 160px; margin-bottom: 20px; border-radius: 10px; }
        .gold-text { color: #F9C71D; font-weight: bold; font-size: 22px; margin-bottom: 5px; display: block; }
        .sub-text { color: #888; font-size: 13px; margin-bottom: 25px; display: block; line-height: 1.4; }
        
        .field-group { text-align: left; margin-bottom: 18px; }
        label { color: #F9C71D; font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; display: block; }
        
        select { 
            width: 100%; 
            padding: 14px; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 10px; 
            outline: none;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        select:focus { border-color: #F9C71D; }

        .hidden { display: none !important; }

        button { 
            width: 100%; 
            padding: 16px; 
            background: #F9C71D; 
            color: #000; 
            border: none; 
            border-radius: 40px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            margin-top: 15px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        button:hover { background: #fff; transform: translateY(-2px); }
        .footer-text { font-size: 10px; color: #444; margin-top: 25px; text-transform: uppercase; }
    </style>
</head>

                        <option>3 Quartos ou mais</option>
                    </select>
                </div>
