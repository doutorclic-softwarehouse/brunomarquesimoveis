<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Marques Imóveis | Premium</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
        }
        .container { 
            background: #121212; 
            border: 1px solid #F9C71D; 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(249, 199, 29, 0.15);
        }
        .logo { max-width: 180px; margin-bottom: 20px; }
        .gold-text { color: #F9C71D; font-weight: bold; font-size: 22px; margin-bottom: 5px; display: block; }
        .sub-text { color: #888; font-size: 14px; margin-bottom: 25px; display: block; line-height: 1.4; }
        
        .field-group { text-align: left; margin-bottom: 18px; }
        label { color: #F9C71D; font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; display: block; }
        
        select { 
            width: 100%; 
            padding: 14px; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 10px; 
            outline: none;
            cursor: pointer;
            font-size: 14px;
        }

        select:focus { border-color: #F9C71D; }

        /* Estilo para esconder campos dinamicamente */
        .hidden { display: none; }

        button { 
            width: 100%; 
            padding: 16px; 
            background: #F9C71D; 
            color: #000; 
            border: none; 
            border-radius: 40px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            margin-top: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        button:hover { background: #fff; transform: translateY(-2px); }
        .footer-text { font-size: 10px; color: #555; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/VpC3nQxQ/logo-edited.jpg" alt="Bruno Marques Imóveis" class="logo">
        
        <span class="gold-text">Atendimento VIP</span>
        <span class="sub-text">Unamar, Tamoios e Região dos Lagos</span>

        <form id="leadForm">
            <div class="field-group">
                <label>O que você precisa hoje?</label>
                <select id="tipo_servico" onchange="ajustarFormulario()">
                    <option value="" disabled selected>Escolha uma opção...</option>
                    <option value="comprar">Quero Comprar um Imóvel</option>
                    <option value="alugar_fixo">Quero Aluguel Fixo (Mensal)</option>
                    <option value="temporada">Aluguel de Temporada (Diárias)</option>
                </select>
            </div>

            <div id="grupo_venda" class="field-group hidden">
                <label>Faixa de Valor (Venda)</label>
                <select id="valor_venda">
                    <option>Até R$ 150 mil</option>
                    <option>R$ 150 mil a R$ 250 mil</option>
                    <option>Acima de R$ 250 mil</option>
                </select>
            </div>

            <div id="grupo_aluguel" class="field-group hidden">
                <label>Preço do Aluguel Mensal</label>
                <select id="valor_aluguel">
                    <option>Até R$ 1.000</option>
                    <option>R$ 1.000 a R$ 2.000</option>
